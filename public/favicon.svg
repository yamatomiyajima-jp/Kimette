      M 80 40
      C 80 18, 112 18, 112 40
      L 112 620
      C 112 642, 80 642, 80 620
      Z
    " fill="#1e4a7a"/>
    <!-- 上の斜め腕 -->
    <path d="
      M 108 370
      L 310 140
      C 330 118, 360 148, 340 168
      L 150 390
      Z
    " fill="#1e4a7a"/>
    <!-- 下の斜め脚（丸く跳ねる） -->
